# 你想监控的来源列表
# 每个来源支持三种 type:
#   rss      — RSS / Atom feed(最稳,推荐)
#   html     — 直接爬 HTML 页面(用 cloudscraper 绕 Cloudflare)
#   mailchimp — Mailchimp 的公开 newsletter archive(很多西班牙小机构用)
#
# 加新来源:复制一个 block,改字段。删掉就直接删 block。

sources:
  # ==================== RSS 主力(最稳定,优先) ====================

  - name: On the Move (聚合 - 全欧洲)
    type: rss
    url: https://on-the-move.org/feed
    location: International
    tags: [aggregator, europe, residencies]

  - name: e-flux Announcements
    type: rss
    url: https://www.e-flux.com/announcements/feed/
    location: International
    tags: [aggregator, prestigious]
    keywords: [open call, residency, application, fellowship, deadline]

  - name: Res Artis Open Calls
    type: rss
    url: https://resartis.org/open-calls/feed/
    location: International
    tags: [aggregator, global]

  - name: TransArtists News
    type: rss
    url: https://www.transartists.org/en/news/rss.xml
    location: International
    tags: [aggregator, europe]

  - name: a-n News
    type: rss
    url: https://www.a-n.co.uk/feed/
    location: UK
    tags: [aggregator, uk]
    keywords: [open call, residency, opportunity, deadline]

  - name: Akimbo
    type: rss
    url: https://akimbo.ca/feed/
    location: Canada/International
    tags: [aggregator, north-america]

  - name: Hyperallergic Opportunities
    type: rss
    url: https://hyperallergic.com/category/opportunities/feed/
    location: US/International
    tags: [aggregator, us]

  - name: Akademie Schloss Solitude News
    type: rss
    url: https://www.akademie-solitude.de/en/news/feed/
    location: Stuttgart, DE
    tags: [tech, web-residency, prestigious]
    keywords: [residency, fellowship, open call, web]

