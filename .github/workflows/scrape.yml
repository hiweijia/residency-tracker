# ==================== 主题契合关键词 ====================
# 文本里包含这些词 → priority_score +1,被排到前面 / 高亮
priority_keywords:
  - migration
  - migrant
  - migración
  - migració
  - diaspora
  - diáspora
  - women
  - mujer
  - mujeres
  - dones
  - feminist
  - feminism
  - feminismo
  - feminisme
  - feministas
  - queer
  - lgbtq
  - lgbtqia+
  - intergenerational
  - generational
  - generación
  - genealogía
  - genealogies
  - genealogia
  - body
  - cuerpo
  - cos
  - corporal
  - walking
  - caminar
  - public space
  - espacio público
  - espai públic
  - chinese
  - asian
  - asiática
  - participatory
  - mediación
  - mediación social
  - decolonial
  - decolonización
  - "2026"
  - "2027"

# ==================== 排除关键词 ====================
# 内容只包含这些(没其他相关内容)→ 跳过
exclude_keywords:
  - past call
  - convocatoria cerrada
  - call closed
  - closed for applications
  - selected artists announced
  - winners announced
  - resultados de la convocatoria
